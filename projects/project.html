<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Project | NYAWOONG</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/project.css">
</head>
<body>

  <header class="project-header">
    <a href="../index.html" class="project-logo">
      NYAWOONG
    </a>

    <a href="../index.html#portfolio" class="back-link">
      ← Portfolio
    </a>
  </header>

  <main id="project-detail">
    <section class="project-hero">
      <p id="detail-category" class="project-label">
        PROJECT
      </p>

      <h1 id="detail-title">
        프로젝트를 불러오는 중입니다.
      </h1>

      <p id="detail-description" class="project-summary"></p>
    </section>

    <section class="project-cover">
      <img
        id="detail-cover"
        src=""
        alt=""
      >
    </section>

    <section class="project-meta">
      <div>
        <span>Period</span>
        <strong id="detail-period">-</strong>
      </div>

      <div>
        <span>Role</span>
        <strong id="detail-role">-</strong>
      </div>

      <div>
        <span>Contribution</span>
        <strong id="detail-contribution">-</strong>
      </div>

      <div>
        <span>Client</span>
        <strong id="detail-client">-</strong>
      </div>
    </section>

    <section class="project-section">
      <p class="project-label">OVERVIEW</p>
      <h2>프로젝트 소개</h2>
      <p id="detail-overview"></p>
    </section>

    <section class="project-columns">
      <article>
        <p class="project-label">PROBLEM</p>
        <h2>문제점</h2>
        <p id="detail-problem"></p>
      </article>

      <article>
        <p class="project-label">SOLUTION</p>
        <h2>해결 방법</h2>
        <p id="detail-solution"></p>
      </article>
    </section>

    <section class="project-section">
      <p class="project-label">RESULT</p>
      <h2>결과</h2>
      <p id="detail-result"></p>
    </section>

    <section class="project-section">
      <p class="project-label">TOOLS</p>
      <h2>사용 기술</h2>
      <p id="detail-tools"></p>
    </section>

    <section
      id="detail-gallery"
      class="project-gallery"
    ></section>

    <nav class="project-navigation" aria-label="프로젝트 이동">
      <a id="previous-project" class="project-navigation-link previous" href="#">
        <span>← Previous Project</span>
        <strong id="previous-project-title">
          이전 프로젝트
        </strong>
      </a>

      <a id="next-project" class="project-navigation-link next" href="#">
        <span>Next Project →</span>
        <strong id="next-project-title">
          다음 프로젝트
        </strong>
      </a>
    </nav>

  </main>

  <script src="../assets/js/project.js"></script>
</body>
</html>
